<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Cardvia · Digital Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      background-color: #050505;
      background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #000000 70%);
      font-family: 'Inter', system-ui, sans-serif;
    }
    h1, h2, .classic-font {
      font-family: 'Playfair Display', serif;
    }
    .lux-card {
      background: linear-gradient(145deg, #121212 0%, #0a0a0a 100%);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), inset 0 1px 1px rgba(255, 215, 0, 0.1);
      border: 1px solid rgba(212, 175, 55, 0.15);
    }
    .gold-gradient-bg {
      background: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
    }
    .gold-gradient-text {
      background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .fade-in {
      animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .btn-lux {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .btn-lux::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(212, 175, 55, 0.15), transparent);
      transform: rotate(45deg);
      transition: all 0.5s ease;
      opacity: 0;
    }
    .btn-lux:hover::after {
      opacity: 1;
      left: 100%;
    }
    .btn-lux:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 15px rgba(212, 175, 55, 0.2);
      border-color: rgba(212, 175, 55, 0.6) !important;
    }
  </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4">

  <div id="root" class="w-full max-w-md mx-auto fade-in"></div>

  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.22.5/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ====== CONFIGURATION ======
    const CONFIG = {
      // ---------- البيانات الشخصية ----------
      fullName: 'Kartar Lamie',
      jobTitle: 'DIGITAL BUSINESS CARD',
      
      // ---------- الصور ----------
      profileImage: 'https://ik.imagekit.io/fojb8puzo/karas',
      profileImageSize: 'w-32 h-32 sm:w-40 sm:h-40', // تم تعديل الحجم ليتناسب مع التصميم الكلاسيكي

      // ---------- أزرار التواصل ----------
      contacts: [
        { icon: 'fa-solid fa-phone', label: 'Call', url: 'tel:+201115575555' },
        { icon: 'fa-brands fa-whatsapp', label: 'WhatsApp', url: 'https://wa.me/201115575555' },
        { icon: 'fa-regular fa-envelope', label: 'Email', url: 'mailto:info@karasfashion.com' },
        { icon: 'fa-solid fa-coins', label: 'Instapay', url: 'https://ipn.eg/' },
      ],
      
      // ---------- روابط التواصل الاجتماعي ----------
      socials: [
        { icon: 'fa-brands fa-instagram', url: 'https://www.facebook.com/kartar.lamie', label: 'Instagram' },
        { icon: 'fa-brands fa-facebook', url: 'https://www.instagram.com/karas.fashion.eg', label: 'Facebook' }
      ],

      // ---------- الألوان الأساسية (الذهبي والأسود) ----------
      colors: {
        textPrimary: '#d4af37',       // ذهبي أساسي
        textSecondary: '#c5a059',     // ذهبي مطفي
        border: '212, 175, 55',       // ذهبي (RGB)
        buttonBg: '#050505',          // أسود غامق للأزرار
        socialIcon: '#d4af37',        // ذهبي
        footerText: '#8a7335',        // ذهبي داكن جداً
      },

      // ---------- بيانات vCard ----------
      vCard: {
        fn: 'Kartar Lamie',
        org: '',
        title: '',
        tel: '+201115575555',
        email: 'info@karasfashion.com',
        url: ''
      },

      // ---------- رقم واتساب لطلب البطاقة ----------
      whatsappRequestNumber: '+201090225298',
    };

    // تتبع النقرات (Google Analytics)
    const trackClick = (label) => {
      if (typeof gtag !== 'undefined') {
        gtag('event', 'button_click', { event_category: 'engagement', event_label: label });
      }
    };

    // تحميل vCard
    const downloadVcard = () => {
      trackClick('download_vcard');
      const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${CONFIG.vCard.fn || CONFIG.fullName}
ORG:${CONFIG.vCard.org}
TITLE:${CONFIG.vCard.title}
TEL:${CONFIG.vCard.tel}
EMAIL:${CONFIG.vCard.email}
URL:${CONFIG.vCard.url}
END:VCARD`;
      const blob = new Blob([vcard], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${CONFIG.fullName.replace(/\s+/g, '_')}.vcf`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };

    // مكون الكارد
    function DigitalBusinessCard() {
      const colors = CONFIG.colors;

      return (
        <div className="lux-card rounded-[2rem] overflow-hidden relative w-full">
          
          {/* الخطوط الذهبية الجانبية (مستوحاة من الصورة) */}
          <div className="absolute top-0 bottom-0 left-4 w-1.5 gold-gradient-bg opacity-90 rounded-full"></div>
          <div className="absolute top-0 bottom-0 left-7 w-[2px] gold-gradient-bg opacity-70 rounded-full"></div>

          {/* المحتوى الرئيسي */}
          <div className="pt-12 pb-8 px-6 space-y-8 pl-12 sm:pl-16 relative z-10">
            
            {/* الصورة الشخصية */}
            <div className="flex justify-center">
              <div className={`${CONFIG.profileImageSize} rounded-full border-[3px] shadow-2xl overflow-hidden`} 
                   style={{ borderColor: colors.textPrimary, boxShadow: `0 0 30px rgba(${colors.border}, 0.2)` }}>
                <img 
                  src={CONFIG.profileImage} 
                  alt={CONFIG.fullName}
                  className="w-full h-full object-cover"
                  onError={(e) => e.target.src = 'https://via.placeholder.com/400?text=Profile'}
                />
              </div>
            </div>

            {/* الاسم + المسمى */}
            <div className="text-center space-y-2">
              <h1 className="text-3xl sm:text-4xl font-bold classic-font gold-gradient-text drop-shadow-md">
                {CONFIG.fullName}
              </h1>
              <h2 className="text-sm sm:text-base font-medium tracking-widest uppercase" style={{ color: colors.textSecondary }}>
                {CONFIG.jobTitle}
              </h2>
            </div>

            {/* أزرار التواصل */}
            <div className="grid grid-cols-1 gap-4 mt-8">
              {CONFIG.contacts.map((btn, idx) => (
                <a
                  key={idx}
                  href={btn.url}
                  target="_blank" rel="noopener noreferrer"
                  className="flex items-center gap-4 px-6 py-4 rounded-xl font-medium btn-lux"
                  style={{
                    backgroundColor: colors.buttonBg,
                    border: `1px solid rgba(${colors.border}, 0.3)`,
                    color: '#ffffff',
                  }}
                  onClick={() => trackClick(`contact_${btn.label}`)}
                  aria-label={btn.label}
                >
                  <i className={`${btn.icon} text-2xl w-8 gold-gradient-text`}></i>
                  <span className="flex-1 text-left tracking-wide text-sm sm:text-base">{btn.label}</span>
                  <i className="fa-solid fa-chevron-right text-xs opacity-50" style={{ color: colors.textPrimary }}></i>
                </a>
              ))}
            </div>

            {/* أيقونات التواصل الاجتماعي */}
            <div className="flex justify-center items-center gap-8 pt-4 pb-2">
              {CONFIG.socials.map((social, idx) => (
                <a
                  key={idx}
                  href={social.url}
                  target="_blank" rel="noopener noreferrer"
                  className="text-3xl hover:scale-110 transition-transform p-2 drop-shadow-lg"
                  style={{ color: colors.socialIcon }}
                  onClick={() => trackClick(`social_${social.label}`)}
                  aria-label={social.label}
                >
                  <i className={social.icon}></i>
                </a>
              ))}
            </div>

            {/* أزرار التحميل */}
            <div className="flex flex-col items-center gap-4 pt-4 border-t border-dashed" style={{ borderColor: `rgba(${colors.border}, 0.2)` }}>
              
              {/* vCard */}
              <div className="w-full">
                <button
                  onClick={downloadVcard}
                  className="w-full flex items-center justify-center gap-3 px-5 py-4 rounded-xl font-bold shadow-lg btn-lux uppercase tracking-wider text-sm classic-font"
                  style={{
                    background: 'linear-gradient(to right, #bf953f, #b38728)',
                    color: '#000000',
                    border: 'none'
                  }}
                  aria-label="Download vCard"
                >
                  <i className="fa-solid fa-address-card text-lg"></i>
                  <span>Save Contact</span>
                </button>
              </div>

              {/* زر طلب البطاقة عبر واتساب */}
              <div className="w-full">
                <a
                  href={`https://wa.me/${CONFIG.whatsappRequestNumber}`}
                  target="_blank" rel="noopener noreferrer"
                  onClick={() => trackClick('request_card_whatsapp')}
                  className="w-full flex items-center justify-center gap-3 px-5 py-4 rounded-xl font-bold shadow-lg btn-lux uppercase tracking-wider text-sm classic-font"
                  style={{
                    backgroundColor: 'transparent',
                    color: colors.textPrimary,
                    border: `1px solid ${colors.textPrimary}`
                  }}
                >
                  <i className="fa-regular fa-id-card text-lg"></i>
                  <span>Request Your Card</span>
                </a>
              </div>
            </div>

            {/* التذييل */}
            <div className="pt-8 text-center">
              <span className="text-[0.65rem] font-semibold tracking-[0.3em] uppercase opacity-80" style={{ color: colors.footerText }}>
                Powered By Cardvia
              </span>
            </div>
            
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DigitalBusinessCard />);
  </script>
</body>
</html>
