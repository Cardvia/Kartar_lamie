<!DOCTYPE html>
<html lang="en" dir="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Karas Fashion · Digital Card</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    
    /* تصميم مستوحى من خلفية الكارد الحريرية الداكنة */
    body {
      background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
      position: relative;
      overflow-x: hidden;
    }

    /* إضافة الخطوط الذهبية الجانبية الفخمة الموجودة في الكارد */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 20px;
      width: 4px;
      height: 100%;
      background: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      opacity: 0.4;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 32px;
      width: 2px;
      height: 100%;
      background: linear-gradient(to bottom, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
      opacity: 0.3;
      z-index: 0;
    }

    .glass-card {
      background: rgba(15, 15, 15, 0.85);
      backdrop-filter: blur(20px) saturate(120%);
      -webkit-backdrop-filter: blur(20px) saturate(120%);
      border: 1px solid rgba(191, 149, 63, 0.2);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
    }
    .fade-in {
      animation: fadeIn 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    .btn-shine {
      position: relative;
      overflow: hidden;
    }
    .btn-shine::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: rotate(45deg);
      transition: all 0.6s ease;
      opacity: 0;
    }
    .btn-shine:hover::after {
      opacity: 1;
      left: 100%;
    }
  </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4 relative z-10">

  <div id="root" class="w-full max-w-md mx-auto fade-in relative z-10"></div>

  <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.22.5/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ====== CONFIGURATION ======
    const CONFIG = {
      // ---------- البيانات الشخصية المستخرجة من الكارد ----------
      fullName: 'Kartar Lamie',
      jobTitle: 'Founder of Karas Fashion',
      arabicTitle: 'براند ملابس كـاراس',
      bio: 'Premium Clothing Brand & Luxury Fashion Designs.',

      // ---------- الصور وشعار البراند ----------
      // يمكنك استبدال الرابط أدناه بلوجو الصقر والتاج الخاص بك ليكون هو الصورة الشخصية الترحيبية
      profileImage: 'https://via.placeholder.com/400/0a0a0a/dfb743?text=KARAS', 
      profileImageSize: 'w-32 h-32 sm:w-36 sm:h-36',
      // صورة الغلاف (يمكن وضع خلفية سوداء سادة أو صورة فوتوغرافية للبراند)
      coverImage: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000&auto=format&fit=crop',

      // ---------- أزرار التواصل المستخرجة من الكارد ----------
      contacts: [
        { icon: 'fa-solid fa-phone', label: 'Call Us', url: 'tel:+201234567890' },
        { icon: 'fa-brands fa-whatsapp', label: 'WhatsApp', url: 'https://wa.me/201234567890' },
        { icon: 'fa-regular fa-envelope', label: 'Email Business', url: 'mailto:Example@domin' },
        { icon: 'fa-solid fa-globe', label: 'Visit Website', url: 'https://www.Domin' },
      ],
      
      // ---------- روابط التواصل الاجتماعي ----------
      socials: [
        { icon: 'fa-brands fa-instagram', url: '#', label: 'Instagram' },
        { icon: 'fa-brands fa-facebook', url: '#', label: 'Facebook' },
        { icon: 'fa-brands fa-tiktok', url: '#', label: 'TikTok' }
      ],

      // ---------- الألوان الذهبية والملكية المتوافقة مع الكارد ----------
      colors: {
        cardBg: '15, 15, 15',               // أسود داكن جداً
        textPrimary: '#fcf6ba',             // ذهبي عاجي فاتح جداً لسهولة القراءة
        textSecondary: '#dfb743',           // ذهبي ملكي متناسق مع الكارد
        textMuted: '#a6a6a6',               // رمادي فضي ناعم للنصوص الفرعية
        buttonBg: 'linear-gradient(135deg, #bf953f 0%, #fcf6ba 25%, #b38728 50%, #fbf5b7 75%, #aa771c 100%)', // تدرج ذهبي ميتاليك فخم للأزرار الرئيسية
        buttonText: '#000000',              // نص أسود فوق الأزرار الذهبية ليعطي تباين فاخر
        socialIcon: '#dfb743',              // أيقونات ذهبية
        footerText: '#737373',              // رمادي هادئ للتذييل
        border: '191, 149, 63',             // حدود ذهبية ناعمة برقم الـ RGB
      },

      // ---------- بيانات vCard للحفظ على الهاتف ----------
      vCard: {
        fn: 'Kartar Lamie (Karas Fashion)',
        org: 'Karas Fashion',
        title: 'Founder',
        tel: '+201234567890',
        email: 'Example@domin',
        url: 'www.Domin'
      },

      // ---------- رقم واتساب لطلب بطاقة كارد فيا ----------
      whatsappRequestNumber: '+201090225298',
    };

    const trackClick = (label) => {
      if (typeof gtag !== 'undefined') {
        gtag('event', 'button_click', { event_category: 'engagement', event_label: label });
      }
    };

    const downloadVcard = () => {
      trackClick('download_vcard');
      const vcard = `BEGIN:VCARD
VERSION:3.0
FN:${CONFIG.vCard.fn || CONFIG.fullName}
ORG:${CONFIG.vCard.org}
TITLE:${CONFIG.vCard.title}
TEL:${CONFIG.vCard.tel}
EMAIL:${CONFIG.vCard.email}
URL:${CONFIG.vCard.url}
END:VCARD`;
      const blob = new Blob([vcard], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `${CONFIG.fullName.replace(/\s+/g, '_')}.vcf`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    };

    function DigitalBusinessCard() {
      const colors = CONFIG.colors;

      return (
        <div 
          className="glass-card rounded-3xl overflow-hidden transition-all duration-500"
          style={{
            backgroundColor: `rgba(${colors.cardBg}, 0.9)`,
            borderColor: `rgba(${colors.border}, 0.3)`,
          }}
        >
          {/* الغلاف الإعلاني */}
          <div className="relative h-48 sm:h-56 mt-0 bg-cover bg-center" style={{ backgroundImage: `url('${CONFIG.coverImage}')` }}>
            <div className="absolute inset-0 bg-gradient-to-t from-[#0f0f0f] to-transparent"></div>
            {/* الصورة الشخصية / اللوجو */}
            <div className="absolute -bottom-12 left-1/2 transform -translate-x-1/2">
              <div className={`${CONFIG.profileImageSize} rounded-full border-2 shadow-2xl overflow-hidden bg-[#0a0a0a]`} 
                   style={{ borderColor: '#dfb743' }}>
                <img 
                  src={CONFIG.profileImage} 
                  alt={CONFIG.fullName}
                  className="w-full h-full object-cover"
                  onError={(e) => e.target.src = 'https://via.placeholder.com/400?text=KARAS'}
                />
              </div>
            </div>
          </div>

          {/* المحتوى الرئيسي */}
          <div className="pt-16 sm:pt-20 pb-6 px-5 sm:px-6 space-y-6">
            {/* الاسم واللقب والبراند */}
            <div className="text-center space-y-1">
              <h1 className="text-3xl sm:text-4xl font-extrabold tracking-wide" style={{ color: colors.textPrimary }}>
                {CONFIG.fullName}
              </h1>
              <h2 className="text-md sm:text-lg font-medium tracking-wider uppercase opacity-90" style={{ color: colors.textSecondary }}>
                {CONFIG.jobTitle}
              </h2>
              <p className="text-sm sm:text-base font-normal opacity-75 mt-1" dir="rtl" style={{ color: colors.textMuted }}>
                {CONFIG.arabicTitle}
              </p>
            </div>

            {/* نبذة عن البراند */}
            {CONFIG.bio && (
              <p className="text-center text-[14px] leading-relaxed px-4 border-l-2 border-r-2 border-[#dfb743]/30" style={{ color: colors.textMuted }}>
                {CONFIG.bio}
              </p>
            )}

            {/* قائمة أزرار الاتصال الفاخرة */}
            <div className="grid grid-cols-1 gap-3 pt-2">
              {CONFIG.contacts.map((btn, idx) => (
                <a
                  key={idx}
                  href={btn.url}
                  target="_blank" rel="noopener noreferrer"
                  className="flex items-center gap-4 px-5 py-3.5 rounded-xl font-medium transition-all hover:scale-[1.01] active:scale-[0.99] btn-shine"
                  style={{
                    backgroundColor: 'rgba(255, 255, 255, 0.03)',
                    border: `1px solid rgba(${colors.border}, 0.15)`,
                    color: '#ffffff',
                  }}
                  onClick={() => trackClick(`contact_${btn.label}`)}
                  aria-label={btn.label}
                >
                  <i className={`${btn.icon} text-xl w-6`} style={{ color: colors.textSecondary }}></i>
                  <span className="flex-1 text-left text-sm tracking-wide">{btn.label}</span>
                  <i className="fa-solid fa-chevron-right text-xs opacity-40" style={{ color: colors.textSecondary }}></i>
                </a>
              ))}
            </div>

            {/* أيقونات التواصل الاجتماعي السفلية */}
            <div className="flex justify-center items-center gap-6 pt-2">
              {CONFIG.socials.map((social, idx) => (
                <a
                  key={idx}
                  href={social.url}
                  target="_blank" rel="noopener noreferrer"
                  className="text-2xl hover:scale-110 transition-transform p-2 bg-white/5 rounded-full border border-white/10"
                  style={{ color: colors.socialIcon }}
                  onClick={() => trackClick(`social_${social.label}`)}
                  aria-label={social.label}
                >
                  <i className={social.icon}></i>
                </a>
              ))}
            </div>

            {/* أزرار الإجراءات الرئيسية الملونة بالذهبي الميتاليك */}
            <div className="flex flex-col items-center gap-4 pt-2">
              {/* حفظ جهة الاتصال */}
              <button
                onClick={downloadVcard}
                className="w-full flex items-center justify-center gap-3 px-5 py-4 rounded-xl font-bold shadow-xl hover:brightness-110 transition-all btn-shine"
                style={{
                  background: colors.buttonBg,
                  color: colors.buttonText,
                }}
              >
                <i className="fa-solid fa-address-card text-lg"></i>
                <span className="tracking-wide text-sm uppercase">Save Contact</span>
              </button>

              {/* طلب الكارد الخاص بك */}
              <a
                href={`https://wa.me/${CONFIG.whatsappRequestNumber}`}
                target="_blank" rel="noopener noreferrer"
                onClick={() => trackClick('request_card_whatsapp')}
                className="w-full flex items-center justify-center gap-3 px-5 py-3.5 rounded-xl font-semibold border transition-all hover:bg-white/5"
                style={{
                  borderColor: `rgba(${colors.border}, 0.5)`,
                  color: colors.textSecondary,
                }}
              >
                <i className="fa-regular fa-id-card text-lg"></i>
                <span className="text-sm tracking-wide">Get Your Digital Card</span>
              </a>
            </div>

            {/* التذييل المتناسق */}
            <div className="pt-4 text-center">
              <span className="text-[0.65rem] font-medium tracking-[0.3em]" style={{ color: colors.footerText }}>
                POWERED BY CARDVIA
              </span>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DigitalBusinessCard />);
  </script>
</body>
</html>
